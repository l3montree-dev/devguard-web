# DevSecOps Workflow Definition
# This workflow is triggered on every push to the repository
name: DevGuard-Web-Workflow

on:
  workflow_dispatch:
  push:

jobs:
  code-scanning:
    uses: l3montree-dev/devguard-ci-components/.github/workflows/code-scanning.yml@main
    permissions:
      contents: read
      security-events: write
    with:
      devguard-asset-name: l3montree-cybersecurity/projects/devguard/assets/devguard-web
      devguard-api-url: https://api.main.devguard.org
      fail-on-risk: high
      fail-on-cvss: high
      web-ui: https://main.devguard.org
      allow-failure: false
    secrets:
      devguard-token: ${{ secrets.DEVGUARD_TOKEN }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Get minor version
        id: tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          MINOR=$(echo "${TAG#v}" | cut -d. -f1-2)
          echo "minor=${MINOR}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844 # v1
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "DevGuard Web ${{ steps.tag.outputs.tag }}"
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.tag, 'test-') || contains(steps.tag.outputs.tag, '-rc') || contains(steps.tag.outputs.tag, '-alpha') || contains(steps.tag.outputs.tag, '-beta') }}
          body: |
            # DevGuard Web ${{ steps.tag.outputs.tag }}

            Frontend web application for the DevGuard platform.

            ### 🐳 Container Image

            ```bash
            docker pull ghcr.io/l3montree-dev/devguard-web:${{ steps.tag.outputs.tag }}
            ```

            ---

            ## Versioning

            All DevGuard components (`devguard`, `devguard-web`, Helm chart) share the same **minor version**. Any `v${{ steps.tag.outputs.minor }}.*` release of one component is compatible with any `v${{ steps.tag.outputs.minor }}.*` release of another. Patch versions are released independently per component — you do not need to upgrade all components simultaneously as long as the minor version matches.

            📖 See [VERSIONING.md](https://github.com/l3montree-dev/devguard/blob/main/VERSIONING.md) for the full policy.
            📋 [Web CHANGELOG](https://github.com/l3montree-dev/devguard-web/blob/main/CHANGELOG.md) — frontend changes in this release.
            📋 [DevGuard CHANGELOG](https://github.com/l3montree-dev/devguard/blob/main/CHANGELOG.md) — API and backend changes.

            ---

            🐛 Report Issues: https://github.com/l3montree-dev/devguard/issues
            💬 Community: https://github.com/l3montree-dev/devguard/discussions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  web-pipeline:
    uses: l3montree-dev/devguard-ci-components/.github/workflows/full-nix.yml@main
    permissions:
      contents: read
      packages: write
      security-events: write
    with:
      nix-target-amd64: devguard-web-amd64
      nix-target-arm64: devguard-web-arm64
      nix-version: '2.34.4'
      image-name: ghcr.io/${{ github.repository }}
      asset-name: l3montree-cybersecurity/projects/devguard/assets/devguard-web
      api-url: https://api.main.devguard.org
      web-ui: https://main.devguard.org
      fail-on-cvss: never
      fail-on-risk: never
      nix-cache-substituter: https://nix.garage.l3montree.cloud
      nix-cache-public-key: nix.garage.l3montree.cloud:MGlzfPQKA91/zxw91CN+GP7NpjAAwmKvWXlDYgeeI8k=
      nix-cache-s3-bucket: nix
      nix-cache-region: garage
    secrets:
      devguard-token: ${{ secrets.DEVGUARD_TOKEN }}
